<svg viewBox="0 0 1800 1280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hammurabi system architecture — Operator → Commander → Conversation → StreamSession + Automations + Org chart aggregation">
  <defs>
    <marker id="s-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3a3a3a"/>
    </marker>
    <marker id="s-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5d7892"/>
    </marker>
    <marker id="s-arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6e8a5e"/>
    </marker>
    <marker id="s-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a9756d"/>
    </marker>
    <style>
      .root      { fill: #f5e9d3; stroke: #b59668; stroke-width: 1.6; }
      .commander { fill: #e9efe6; stroke: #6e8a5e; stroke-width: 1.6; }
      .conv      { fill: #e1e9f1; stroke: #5d7892; stroke-width: 1.4; }
      .conv-ui   { fill: #f3eef7; stroke: #8669a3; stroke-width: 1.4; }
      .stream    { fill: #fff; stroke: #4a4a4a; stroke-width: 1.2; }
      .auto      { fill: #efe6e6; stroke: #a9756d; stroke-width: 1.4; }
      .channel   { fill: #ddebf7; stroke: #4476a8; stroke-width: 1.4; }
      .external  { fill: #fef5e7; stroke: #c08e3f; stroke-width: 1.4; stroke-dasharray: 4 3; }
      .panel     { fill: #fbfaf6; stroke: #d8d2c4; stroke-width: 1; }
      .label     { font-family: "JetBrains Mono", monospace; font-size: 12px; fill: #1d1d1d; }
      .label-bold{ font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 600; fill: #1d1d1d; }
      .role      { font-family: "JetBrains Mono", monospace; font-size: 9px; fill: #54514a; letter-spacing: 0.06em; }
      .meta      { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #6f6a5d; }
      .title     { font-family: "JetBrains Mono", monospace; font-size: 17px; font-weight: 600; fill: #2a2a2a; letter-spacing: 0.06em; }
      .subtitle  { font-family: "JetBrains Mono", monospace; font-size: 11px; fill: #5e5a52; letter-spacing: 0.04em; text-transform: uppercase; }
      .arrow     { stroke: #3a3a3a; stroke-width: 1.4; fill: none; }
      .arrow-blue{ stroke: #5d7892; stroke-width: 1.4; fill: none; }
      .arrow-green { stroke: #6e8a5e; stroke-width: 1.4; fill: none; }
      .arrow-orange { stroke: #a9756d; stroke-width: 1.4; fill: none; }
      .divider   { stroke: #c9c2b3; stroke-width: 1; stroke-dasharray: 4 3; }
      .layer-bg  { fill: #f6f3ec; opacity: 0.6; }
      .layer-label { font-family: "JetBrains Mono", monospace; font-size: 11px; fill: #54514a; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
    </style>
  </defs>

  <text x="900" y="34" text-anchor="middle" class="title">HAMMURABI SYSTEM ARCHITECTURE — POST #1216 (proposed v8 wiring)</text>
  <text x="900" y="56" text-anchor="middle" class="subtitle">how Operator · Commander · Conversation · StreamSession · Automation interconnect</text>

  <!-- Layer backdrops -->
  <rect x="20" y="80" width="1760" height="100" class="layer-bg"/>
  <text x="40" y="100" class="layer-label">L0 · OPERATOR (singleton)</text>

  <rect x="20" y="190" width="1760" height="180" class="layer-bg"/>
  <text x="40" y="210" class="layer-label">L1 · COMMANDER (identity + config)</text>

  <rect x="20" y="380" width="1760" height="280" class="layer-bg"/>
  <text x="40" y="400" class="layer-label">L2 · CONVERSATION (runtime · NEW post-#1216)</text>

  <rect x="20" y="670" width="1760" height="180" class="layer-bg"/>
  <text x="40" y="690" class="layer-label">L3 · STREAM SESSION (provider runtime)</text>

  <rect x="20" y="860" width="1760" height="200" class="layer-bg"/>
  <text x="40" y="880" class="layer-label">L4 · AUTOMATION + EXTERNAL TRIGGERS</text>

  <rect x="20" y="1070" width="1760" height="160" class="layer-bg"/>
  <text x="40" y="1090" class="layer-label">L5 · ORG CHART READ MODEL  (GET /api/org · PROPOSED v8)</text>

  <!-- L0 Operator -->
  <rect x="780" y="115" width="240" height="55" rx="8" class="root"/>
  <text x="900" y="138" text-anchor="middle" class="label-bold">[Operator: Nick Gu]</text>
  <text x="900" y="156" text-anchor="middle" class="role">~/.hammurabi/operators.json</text>

  <!-- L1 Commanders -->
  <rect x="200" y="225" width="380" height="135" rx="8" class="commander"/>
  <text x="390" y="248" text-anchor="middle" class="label-bold">[Commander: Athena]</text>
  <text x="390" y="265" text-anchor="middle" class="role">ROLE=ENGINEERING · operatorId=&lt;nick&gt;</text>
  <line x1="220" y1="278" x2="560" y2="278" class="divider"/>
  <text x="220" y="298" class="meta">id, host, persona, agentType, effort,</text>
  <text x="220" y="314" class="meta">cwd, maxTurns, contextMode, taskSource,</text>
  <text x="220" y="330" class="meta">remoteOrigin, state ∈ {idle|running|stopped|paused}</text>
  <text x="220" y="350" class="role" fill="#6e8a5e">commanders/store.ts:94-109 (narrowed post-#1216)</text>

  <rect x="710" y="225" width="380" height="135" rx="8" class="commander"/>
  <text x="900" y="248" text-anchor="middle" class="label-bold">[Commander: Hermes]</text>
  <text x="900" y="265" text-anchor="middle" class="role">ROLE=VALIDATOR · operatorId=&lt;nick&gt;</text>
  <line x1="730" y1="278" x2="1070" y2="278" class="divider"/>
  <text x="730" y="298" class="meta">(same shape, different identity)</text>

  <rect x="1220" y="225" width="380" height="135" rx="8" class="commander"/>
  <text x="1410" y="248" text-anchor="middle" class="label-bold">[Commander: Atlas]</text>
  <text x="1410" y="265" text-anchor="middle" class="role">ROLE=OPS · operatorId=&lt;nick&gt;</text>
  <line x1="1240" y1="278" x2="1580" y2="278" class="divider"/>
  <text x="1240" y="298" class="meta">(same shape, different identity)</text>

  <!-- Operator → Commanders arrows -->
  <path d="M 900,170 Q 900,200 390,225" class="arrow" marker-end="url(#s-arrow)"/>
  <path d="M 900,170 L 900,225" class="arrow" marker-end="url(#s-arrow)"/>
  <path d="M 900,170 Q 900,200 1410,225" class="arrow" marker-end="url(#s-arrow)"/>

  <!-- L2 Conversations under Athena -->
  <rect x="50" y="420" width="220" height="95" rx="6" class="conv"/>
  <text x="160" y="440" text-anchor="middle" class="label-bold">[Conv: chat-1]</text>
  <text x="160" y="456" text-anchor="middle" class="role">SURFACE=WHATSAPP · channel-bound</text>
  <line x1="65" y1="466" x2="255" y2="466" class="divider"/>
  <text x="65" y="482" class="meta">channelMeta.peerId=peer-x</text>
  <text x="65" y="496" class="meta">currentTask, totalCostUsd,</text>
  <text x="65" y="510" class="meta">claudeSessionId — own slot</text>

  <rect x="285" y="420" width="220" height="95" rx="6" class="conv"/>
  <text x="395" y="440" text-anchor="middle" class="label-bold">[Conv: chat-2]</text>
  <text x="395" y="456" text-anchor="middle" class="role">SURFACE=TELEGRAM · channel-bound</text>
  <line x1="300" y1="466" x2="490" y2="466" class="divider"/>
  <text x="300" y="482" class="meta">channelMeta.peerId=peer-y</text>
  <text x="300" y="496" class="meta">independent task / cost / session</text>

  <rect x="50" y="535" width="220" height="95" rx="6" class="conv-ui"/>
  <text x="160" y="555" text-anchor="middle" class="label-bold">[Conv: chat-3]</text>
  <text x="160" y="571" text-anchor="middle" class="role">SURFACE=UI · ephemeral</text>
  <line x1="65" y1="581" x2="255" y2="581" class="divider"/>
  <text x="65" y="597" class="meta">no channelMeta</text>
  <text x="65" y="611" class="meta">UI explicit-Start required</text>
  <text x="65" y="625" class="meta">stays off org chart</text>

  <rect x="285" y="535" width="220" height="95" rx="6" class="conv-ui"/>
  <text x="395" y="555" text-anchor="middle" class="label-bold">[Conv: chat-4]</text>
  <text x="395" y="571" text-anchor="middle" class="role">SURFACE=CLI · ephemeral</text>
  <line x1="300" y1="581" x2="490" y2="581" class="divider"/>
  <text x="300" y="597" class="meta">no channelMeta</text>
  <text x="300" y="611" class="meta">CLI invocation</text>
  <text x="300" y="625" class="meta">stays off org chart</text>

  <!-- Athena → Conversations arrows -->
  <path d="M 390,360 L 160,420" class="arrow-blue" marker-end="url(#s-arrow-blue)"/>
  <path d="M 390,360 L 395,420" class="arrow-blue" marker-end="url(#s-arrow-blue)"/>
  <path d="M 390,360 Q 200,460 160,535" class="arrow-blue" marker-end="url(#s-arrow-blue)"/>
  <path d="M 390,360 Q 350,460 395,535" class="arrow-blue" marker-end="url(#s-arrow-blue)"/>

  <!-- L2 Conversation under Hermes -->
  <rect x="800" y="420" width="220" height="95" rx="6" class="conv"/>
  <text x="910" y="440" text-anchor="middle" class="label-bold">[Conv: chat-5]</text>
  <text x="910" y="456" text-anchor="middle" class="role">SURFACE=DISCORD · channel-bound</text>
  <line x1="815" y1="466" x2="1005" y2="466" class="divider"/>
  <text x="815" y="482" class="meta">channelMeta.peerId=peer-z</text>

  <rect x="800" y="535" width="220" height="95" rx="6" class="conv-ui"/>
  <text x="910" y="555" text-anchor="middle" class="label-bold">[Conv: chat-6]</text>
  <text x="910" y="571" text-anchor="middle" class="role">SURFACE=UI · ephemeral</text>

  <path d="M 900,360 L 910,420" class="arrow-blue" marker-end="url(#s-arrow-blue)"/>
  <path d="M 900,360 Q 905,460 910,535" class="arrow-blue" marker-end="url(#s-arrow-blue)"/>

  <!-- L2 Conversation under Atlas (none channel-bound, just legacy) -->
  <rect x="1300" y="420" width="220" height="95" rx="6" class="conv"/>
  <text x="1410" y="440" text-anchor="middle" class="label-bold">[Conv: legacy]</text>
  <text x="1410" y="456" text-anchor="middle" class="role">LEGACY BACKFILL · SHA-derived id</text>
  <line x1="1315" y1="466" x2="1505" y2="466" class="divider"/>
  <text x="1315" y="482" class="meta">commander pre-#1216</text>
  <text x="1315" y="496" class="meta">session name = commander-${id}</text>
  <text x="1315" y="510" class="meta">no surface promotion</text>

  <path d="M 1410,360 L 1410,420" class="arrow-blue" marker-end="url(#s-arrow-blue)"/>

  <!-- L3 Stream sessions -->
  <rect x="50" y="700" width="220" height="80" rx="6" class="stream"/>
  <text x="160" y="722" text-anchor="middle" class="label-bold">commander-${id}-conversation-${convId}</text>
  <text x="160" y="740" text-anchor="middle" class="role">stream session per conv</text>
  <text x="160" y="758" text-anchor="middle" class="meta">claude / codex / gemini</text>

  <rect x="285" y="700" width="220" height="80" rx="6" class="stream"/>
  <text x="395" y="722" text-anchor="middle" class="label-bold">commander-${id}-conversation-${convId}</text>
  <text x="395" y="740" text-anchor="middle" class="role">stream session per conv</text>
  <text x="395" y="758" text-anchor="middle" class="meta">claude / codex / gemini</text>

  <rect x="800" y="700" width="220" height="80" rx="6" class="stream"/>
  <text x="910" y="722" text-anchor="middle" class="label-bold">commander-${id}-conversation-${convId}</text>
  <text x="910" y="740" text-anchor="middle" class="role">stream session per conv</text>

  <rect x="1300" y="700" width="220" height="80" rx="6" class="stream"/>
  <text x="1410" y="722" text-anchor="middle" class="label-bold">commander-${id}</text>
  <text x="1410" y="740" text-anchor="middle" class="role">LEGACY name (single per commander)</text>

  <path d="M 160,515 L 160,700" class="arrow" marker-end="url(#s-arrow)"/>
  <path d="M 395,515 L 395,700" class="arrow" marker-end="url(#s-arrow)"/>
  <path d="M 160,630 L 160,700" class="arrow" marker-end="url(#s-arrow)" stroke-dasharray="3 3"/>
  <path d="M 395,630 L 395,700" class="arrow" marker-end="url(#s-arrow)" stroke-dasharray="3 3"/>
  <path d="M 910,515 L 910,700" class="arrow" marker-end="url(#s-arrow)"/>
  <path d="M 1410,515 L 1410,700" class="arrow" marker-end="url(#s-arrow)"/>

  <!-- Inline note: stream session naming -->
  <text x="640" y="750" class="meta" fill="#a9756d">conversation-runtime.ts:17-21 — buildConversationSessionName(conv)</text>
  <text x="640" y="765" class="meta" fill="#a9756d">isLegacy ? `commander-${id}` : `commander-${id}-conversation-${convId}`</text>

  <!-- L4 Automations + Channel webhooks -->
  <rect x="50" y="900" width="380" height="140" rx="8" class="auto"/>
  <text x="240" y="922" text-anchor="middle" class="label-bold">[Automation: data-sink]</text>
  <text x="240" y="938" text-anchor="middle" class="role">TRIGGER=SCHEDULE · operator-level</text>
  <line x1="65" y1="950" x2="415" y2="950" class="divider"/>
  <text x="65" y="970" class="meta">spec v7: one Automation entity, three trigger modes</text>
  <text x="65" y="986" class="meta">today: 3 separate node-cron schedulers (NOT YET UNIFIED):</text>
  <text x="80" y="1002" class="meta">· SentinelScheduler  · CommandRoomScheduler  · commander-cron</text>
  <text x="65" y="1024" class="role" fill="#a9756d">FILES TO COLLAPSE: modules/sentinels/scheduler.ts:78  · modules/command-room/scheduler.ts:56  ·</text>
  <text x="65" y="1037" class="role" fill="#a9756d">                      modules/commanders/cron.ts:41</text>

  <rect x="460" y="900" width="380" height="140" rx="8" class="auto"/>
  <text x="650" y="922" text-anchor="middle" class="label-bold">[Automation: validator-on-quest]</text>
  <text x="650" y="938" text-anchor="middle" class="role">TRIGGER=QUEST · commander-scoped (Athena)</text>
  <line x1="475" y1="950" x2="825" y2="950" class="divider"/>
  <text x="475" y="970" class="meta">questTrigger.event=completed</text>
  <text x="475" y="986" class="meta">fires on commander quest completion;</text>
  <text x="475" y="1002" class="meta">spawns Stream Session via dispatch route.</text>
  <text x="475" y="1024" class="role" fill="#a9756d">spec v7: trigger=quest is a discriminator</text>

  <!-- Channel webhooks (external) -->
  <rect x="870" y="900" width="380" height="140" rx="8" class="external"/>
  <text x="1060" y="922" text-anchor="middle" class="label-bold">EXTERNAL · CHANNEL WEBHOOKS</text>
  <text x="1060" y="938" text-anchor="middle" class="role">whatsapp / telegram / discord</text>
  <line x1="885" y1="950" x2="1235" y2="950" class="divider"/>
  <text x="885" y="970" class="meta">POST /api/commanders/channel-message</text>
  <text x="885" y="986" class="meta">→ findOrCreateConversationBySessionKey</text>
  <text x="885" y="1002" class="meta">→ deliverConversationMessage(autoStartIdle=true)</text>
  <text x="885" y="1024" class="role" fill="#a9756d">register-channels.ts:114-238  · auto-resume idle on inbound</text>

  <!-- Cron-triggered automation example -->
  <rect x="1280" y="900" width="380" height="140" rx="8" class="auto"/>
  <text x="1470" y="922" text-anchor="middle" class="label-bold">[Automation: context-hygiene]</text>
  <text x="1470" y="938" text-anchor="middle" class="role">TRIGGER=SCHEDULE · commander-scoped (Athena)</text>
  <line x1="1295" y1="950" x2="1645" y2="950" class="divider"/>
  <text x="1295" y="970" class="meta">cron string: "0 2 * * *"</text>
  <text x="1295" y="986" class="meta">parentCommanderId=athena.id</text>
  <text x="1295" y="1002" class="meta">runs in commander's cwd, with skills</text>

  <!-- Channel webhook → Conv arrow -->
  <path d="M 1060,900 Q 920,800 395,515" class="arrow-orange" marker-end="url(#s-arrow-orange)"/>
  <text x="900" y="700" class="meta" fill="#a9756d">webhook auto-creates conv if not bound to sessionKey</text>

  <!-- L5 Org chart read model -->
  <rect x="80" y="1110" width="1640" height="100" rx="8" class="panel" stroke="#4476a8"/>
  <text x="900" y="1136" text-anchor="middle" class="label-bold" fill="#4476a8">GET /api/org → OrgTree { operator, commanders[], automations[] }</text>
  <text x="900" y="1156" text-anchor="middle" class="meta">commanders[].channels = aggregate by surface (whatsapp · 2,  telegram · 1,  discord · 1)  ←  NEW post-#1216</text>
  <text x="900" y="1174" text-anchor="middle" class="meta">commanders[].activeUiChats = count(conv.surface ∈ ui|cli|api && conv.status = active)  ←  NEW</text>
  <text x="900" y="1192" text-anchor="middle" class="meta">commanders[].costUsd = sum(conversation.totalCostUsd)  ·  reuses agents/session/state.ts:aggregateCommanderWorldAgentSource</text>

  <!-- L5 → up arrows -->
  <path d="M 240,1110 Q 240,1075 240,1040" class="arrow-green" marker-end="url(#s-arrow-green)" stroke-dasharray="3 3"/>
  <path d="M 650,1110 Q 650,1075 650,1040" class="arrow-green" marker-end="url(#s-arrow-green)" stroke-dasharray="3 3"/>
  <path d="M 1060,1110 Q 1060,1075 1060,1040" class="arrow-green" marker-end="url(#s-arrow-green)" stroke-dasharray="3 3"/>
  <path d="M 1470,1110 Q 1470,1075 1470,1040" class="arrow-green" marker-end="url(#s-arrow-green)" stroke-dasharray="3 3"/>

  <!-- Footer -->
  <text x="900" y="1265" text-anchor="middle" class="meta">arrows: solid = ownership · dashed = aggregation · orange = external trigger · blue = parent→runtime  ·  source: PR #1279 ea70a211</text>
</svg>
