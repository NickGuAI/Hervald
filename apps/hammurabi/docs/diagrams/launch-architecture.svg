<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hervald launch architecture">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495E"/>
    </marker>
  </defs>

  <rect width="920" height="560" fill="#f7f2ea"/>
  <text x="460" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#1f2933">Hervald Launch Architecture</text>
  <text x="460" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#52606d">Hervald owns orchestration; connectivity is delegated.</text>

  <rect x="40" y="100" width="210" height="120" rx="14" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="145" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1f2933">Operator</text>
  <text x="145" y="156" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d">Browser / Phone</text>
  <text x="145" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d">API-key first boot</text>
  <text x="145" y="196" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d">Auth0 optional later</text>

  <rect x="305" y="82" width="300" height="176" rx="16" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="455" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1f2933">Deploy Hervald Here</text>
  <text x="455" y="136" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#52606d">Same codebase, same shell, different host.</text>

  <rect x="330" y="160" width="78" height="66" rx="10" fill="#ffffff" stroke="#1f2933"/>
  <text x="369" y="188" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#1f2933">Mac mini</text>
  <text x="369" y="207" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">same-host</text>

  <rect x="421" y="160" width="78" height="66" rx="10" fill="#ffffff" stroke="#1f2933"/>
  <text x="460" y="188" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#1f2933">EC2 / VPS</text>
  <text x="460" y="207" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">SSH fan-out</text>

  <rect x="512" y="160" width="68" height="66" rx="10" fill="#ffffff" stroke="#1f2933"/>
  <text x="546" y="188" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#1f2933">Railway</text>
  <text x="546" y="207" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">host shell</text>

  <text x="455" y="242" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d">Internal engine names stay Hammurabi: apps/hammurabi, hammurabi-cli, ~/.hammurabi, HAMMURABI_*</text>

  <rect x="650" y="100" width="230" height="120" rx="14" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="765" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1f2933">Worker Attachment</text>
  <text x="765" y="156" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d">No daemon transport in Phase 1</text>
  <text x="765" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d">same-host · direct SSH · Tailscale + SSH</text>
  <text x="765" y="196" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d">Connectivity fabric is external to Hervald</text>

  <path d="M 250 160 L 305 160" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="278" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#34495E">HTTPS / WS</text>

  <path d="M 605 160 L 650 160" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="627" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#34495E">SSH dispatch</text>

  <rect x="70" y="300" width="350" height="170" rx="16" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="245" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1f2933">Hervald Shell</text>
  <text x="245" y="356" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#52606d">Command Room · Fleet · Telemetry Hub · Settings · Services Manager · Action Policies</text>

  <rect x="102" y="386" width="110" height="48" rx="10" fill="#efe7db" stroke="#9b8f7a"/>
  <text x="157" y="406" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#1f2933">Commanders</text>
  <text x="157" y="423" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">chat + control</text>

  <rect x="230" y="386" width="110" height="48" rx="10" fill="#efe7db" stroke="#9b8f7a"/>
  <text x="285" y="406" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#1f2933">Quests</text>
  <text x="285" y="423" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">issue lanes</text>

  <rect x="358" y="386" width="110" height="48" rx="10" fill="#efe7db" stroke="#9b8f7a"/>
  <text x="413" y="406" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#1f2933">Sentinels</text>
  <text x="413" y="423" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">scheduled watchers</text>

  <rect x="500" y="300" width="350" height="170" rx="16" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="675" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1f2933">Provider Runtime Stays Local</text>
  <text x="675" y="356" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#52606d">Credentials live on the worker machine, not inside Hervald.</text>

  <rect x="530" y="386" width="86" height="48" rx="10" fill="#efe7db" stroke="#9b8f7a"/>
  <text x="573" y="406" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#1f2933">Claude</text>
  <text x="573" y="423" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">setup-token</text>

  <rect x="630" y="386" width="86" height="48" rx="10" fill="#efe7db" stroke="#9b8f7a"/>
  <text x="673" y="406" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#1f2933">Codex</text>
  <text x="673" y="423" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">API key / device</text>

  <rect x="730" y="386" width="86" height="48" rx="10" fill="#efe7db" stroke="#9b8f7a"/>
  <text x="773" y="406" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#1f2933">Gemini</text>
  <text x="773" y="423" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">GEMINI_API_KEY</text>

  <path d="M 420 385 L 500 385" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="460" y="372" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#34495E">spawn / resume via attached machine</text>

  <text x="460" y="520" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#52606d">Phase 1 keeps the current same-host and SSH paths. Public branding changes to Hervald; the internal engine contract stays Hammurabi.</text>
</svg>
