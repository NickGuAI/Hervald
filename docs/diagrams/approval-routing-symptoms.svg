<svg viewBox="0 0 920 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Approval routing — symptom to likely cause">
  <defs>
    <marker id="ars-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495E"/>
    </marker>
  </defs>

  <rect width="920" height="320" fill="#f7f2ea"/>
  <text x="460" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#1f2933">Symptom → likely cause</text>

  <!-- header -->
  <text x="190" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d" font-weight="bold">Symptom you see</text>
  <text x="730" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#52606d" font-weight="bold">Where to look first</text>

  <!-- Row 1 -->
  <rect x="40" y="98" width="300" height="60" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="190" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">Claude says "command requires</text>
  <text x="190" y="142" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">approval" and queue is empty</text>

  <path d="M 340 128 L 578 128" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ars-arrow)"/>

  <rect x="580" y="98" width="300" height="60" rx="10" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="730" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">Claude hook contract failure</text>
  <text x="730" y="142" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">missing structured PreToolUse JSON, or shell expansion error</text>

  <!-- Row 2 -->
  <rect x="40" y="180" width="300" height="60" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="190" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">Codex session fails to start</text>
  <text x="190" y="224" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">before the first turn</text>

  <path d="M 340 210 L 578 210" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ars-arrow)"/>

  <rect x="580" y="180" width="300" height="60" rx="10" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="730" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">Initialize capability mismatch</text>
  <text x="730" y="224" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">experimentalApi missing or granular policy unsupported</text>

  <!-- Row 3 -->
  <rect x="40" y="262" width="300" height="40" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="190" y="288" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">Pending item visible in queue</text>

  <path d="M 340 282 L 578 282" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ars-arrow)"/>

  <rect x="580" y="262" width="300" height="40" rx="10" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="730" y="288" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2933">Routing is healthy — policy is review</text>
</svg>
