<svg viewBox="0 0 1800 1100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Org chart taxonomy — #1198 Spec v7 vs proposed v8 (after #1216 parallel chats)">
  <defs>
    <marker id="o-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3a3a3a"/>
    </marker>
    <style>
      .root      { fill: #f5e9d3; stroke: #b59668; stroke-width: 1.5; }
      .commander { fill: #e9efe6; stroke: #6e8a5e; stroke-width: 1.5; }
      .auto      { fill: #efe6e6; stroke: #a9756d; stroke-width: 1.2; }
      .channel   { fill: #e1e9f1; stroke: #5d7892; stroke-width: 1.4; }
      .conv-ui   { fill: #f3eef7; stroke: #8669a3; stroke-width: 1.2; stroke-dasharray: 4 3; }
      .gap       { fill: #fff7d8; stroke: #b89a45; stroke-width: 1; stroke-dasharray: 2 2; }
      .label     { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 13px; fill: #1d1d1d; }
      .role      { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #54514a; letter-spacing: 0.06em; }
      .meta      { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #6f6a5d; }
      .title     { font-family: "JetBrains Mono", monospace; font-size: 17px; font-weight: 600; fill: #2a2a2a; letter-spacing: 0.06em; }
      .subtitle  { font-family: "JetBrains Mono", monospace; font-size: 11px; fill: #5e5a52; letter-spacing: 0.04em; text-transform: uppercase; }
      .panel     { fill: #fbfaf6; stroke: #d8d2c4; stroke-width: 1; }
      .divider   { stroke: #c9c2b3; stroke-width: 1; stroke-dasharray: 4 3; }
      .arrow     { stroke: #3a3a3a; stroke-width: 1.4; fill: none; }
      .new       { font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 600; fill: #2a6f3e; letter-spacing: 0.04em; }
      .badge     { fill: #2a6f3e; stroke: none; }
      .badge-text { font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 600; fill: #ffffff; letter-spacing: 0.06em; }
    </style>
  </defs>

  <text x="900" y="34" text-anchor="middle" class="title">ORG CHART TAXONOMY · #1198 SPEC v7 vs PROPOSED v8</text>
  <text x="900" y="56" text-anchor="middle" class="subtitle">After #1216 parallel-chats-per-commander landed</text>

  <!-- Left panel: BEFORE (Spec v7) -->
  <rect x="30" y="80" width="850" height="970" rx="10" class="panel"/>
  <text x="455" y="115" text-anchor="middle" class="title">BEFORE · #1198 v7 (frozen 2026-04-26)</text>
  <text x="455" y="138" text-anchor="middle" class="subtitle">3 nouns · chat is "deliberate gap" · single-conversation framing</text>

  <!-- Operator root -->
  <rect x="335" y="172" width="240" height="80" rx="8" class="root"/>
  <text x="455" y="200" text-anchor="middle" class="label" font-weight="600">[Operator: Nick Gu]</text>
  <text x="455" y="220" text-anchor="middle" class="role">KIND=FOUNDER  ·  EMAIL REQUIRED</text>
  <text x="455" y="238" text-anchor="middle" class="meta">~/.hammurabi/operators.json</text>

  <!-- Operator-level automations -->
  <line x1="455" y1="252" x2="455" y2="282" class="arrow" marker-end="url(#o-arrow)"/>

  <rect x="60" y="290" width="240" height="60" rx="6" class="auto"/>
  <text x="180" y="316" text-anchor="middle" class="label">[Automation: data-sink]</text>
  <text x="180" y="334" text-anchor="middle" class="role">TRIGGER=SCHEDULE · OPERATOR-LEVEL</text>

  <rect x="335" y="290" width="240" height="60" rx="6" class="auto"/>
  <text x="455" y="316" text-anchor="middle" class="label">[Automation: daily-briefing]</text>
  <text x="455" y="334" text-anchor="middle" class="role">TRIGGER=SCHEDULE · OPERATOR-LEVEL</text>

  <rect x="610" y="290" width="240" height="60" rx="6" class="auto"/>
  <text x="730" y="316" text-anchor="middle" class="label">[Automation: memory-cons]</text>
  <text x="730" y="334" text-anchor="middle" class="role">TRIGGER=SCHEDULE · OPERATOR-LEVEL</text>

  <!-- Athena commander card -->
  <rect x="60" y="380" width="380" height="220" rx="8" class="commander"/>
  <text x="250" y="408" text-anchor="middle" class="label" font-weight="600">[Commander: Athena]</text>
  <text x="250" y="426" text-anchor="middle" class="role">ROLE=ENGINEERING</text>
  <line x1="80" y1="442" x2="420" y2="442" class="divider"/>
  <text x="80" y="464" class="meta">— [Automation: context-hygiene]   trigger=schedule</text>
  <text x="80" y="482" class="meta">— [Automation: validator-on-quest]  trigger=quest</text>
  <text x="80" y="500" class="meta">— [Automation: ad-hoc-investigate] trigger=manual</text>
  <line x1="80" y1="516" x2="420" y2="516" class="divider"/>
  <text x="80" y="538" class="meta">Quests in flight:  2 active / 0 pending</text>
  <text x="80" y="556" class="meta">Cost (24h):        $4.21</text>
  <text x="80" y="582" class="role">CHAT?  → SEE /COMMAND-ROOM (DELIBERATE GAP)</text>

  <!-- Hermes commander card -->
  <rect x="470" y="380" width="380" height="220" rx="8" class="commander"/>
  <text x="660" y="408" text-anchor="middle" class="label" font-weight="600">[Commander: Hermes]</text>
  <text x="660" y="426" text-anchor="middle" class="role">ROLE=VALIDATOR</text>
  <line x1="490" y1="442" x2="830" y2="442" class="divider"/>
  <text x="490" y="464" class="meta">(no automations)</text>
  <line x1="490" y1="516" x2="830" y2="516" class="divider"/>
  <text x="490" y="538" class="meta">Quests in flight:  1 active / 3 pending</text>
  <text x="490" y="556" class="meta">Cost (24h):        $0.67</text>
  <text x="490" y="582" class="role">CHAT?  → SEE /COMMAND-ROOM (DELIBERATE GAP)</text>

  <!-- Constraint #6 callout -->
  <rect x="60" y="650" width="790" height="115" rx="8" class="gap"/>
  <text x="455" y="676" text-anchor="middle" class="label" font-weight="600">CONSTRAINT #6 — "No live worker sessions on the chart. Persistent identities only."</text>
  <text x="80" y="700" class="meta">Spec v7 presumes one stream session per commander. Channel-bound chats and UI chats both</text>
  <text x="80" y="716" class="meta">land on the same legacy session — `commander-${id}` — and aren't differentiated. The chart</text>
  <text x="80" y="732" class="meta">treats every chat as ephemeral, including persistent webhook bindings (whatsapp peer X).</text>
  <text x="80" y="752" class="role" fill="#a9756d">FRAMING WAS FROZEN 2026-04-26 — BEFORE #1216 LANDED</text>

  <!-- Implementation status -->
  <rect x="60" y="790" width="790" height="245" rx="8" class="panel" stroke="#a9756d" stroke-dasharray="3 3"/>
  <text x="455" y="816" text-anchor="middle" class="label" font-weight="600" fill="#a9756d">IMPLEMENTATION STATUS @ ea70a211 — ENTIRELY UNSHIPPED</text>
  <text x="80" y="844" class="meta" fill="#5e5a52">✗ No `Operator` entity. No ~/.hammurabi/operators.json.</text>
  <text x="80" y="864" class="meta" fill="#5e5a52">✗ No `Automation` entity. Sentinels + Crons remain split.</text>
  <text x="80" y="884" class="meta" fill="#5e5a52">✗ No GET /api/org. No /org frontend route.</text>
  <text x="80" y="904" class="meta" fill="#5e5a52">✗ Three node-cron schedulers still live:</text>
  <text x="100" y="922" class="meta" fill="#5e5a52">  · SentinelScheduler (modules/sentinels/scheduler.ts:78)</text>
  <text x="100" y="940" class="meta" fill="#5e5a52">  · CommandRoomScheduler (modules/command-room/scheduler.ts:56)</text>
  <text x="100" y="958" class="meta" fill="#5e5a52">  · registerCommanderCron (modules/commanders/cron.ts:41)</text>
  <text x="80" y="982" class="meta" fill="#5e5a52">✓ apps/hammurabi/modules/fleet/ already absent (deletion target was already gone).</text>
  <text x="80" y="1010" class="role" fill="#2a6f3e">UNSHIPPED → CLEAN SLATE TO REVISE BEFORE BUILDING</text>

  <!-- Right panel: AFTER (proposed v8) -->
  <rect x="920" y="80" width="850" height="970" rx="10" class="panel"/>
  <text x="1345" y="115" text-anchor="middle" class="title">AFTER · PROPOSED v8 (post-#1216-aware)</text>
  <text x="1345" y="138" text-anchor="middle" class="subtitle">3 nouns kept · channel chips on commander cards · UI chats stay off-chart</text>

  <!-- Operator root -->
  <rect x="1225" y="172" width="240" height="80" rx="8" class="root"/>
  <text x="1345" y="200" text-anchor="middle" class="label" font-weight="600">[Operator: Nick Gu]</text>
  <text x="1345" y="220" text-anchor="middle" class="role">KIND=FOUNDER  ·  EMAIL REQUIRED</text>
  <text x="1345" y="238" text-anchor="middle" class="meta">(unchanged from v7)</text>

  <line x1="1345" y1="252" x2="1345" y2="282" class="arrow" marker-end="url(#o-arrow)"/>

  <rect x="950" y="290" width="240" height="60" rx="6" class="auto"/>
  <text x="1070" y="316" text-anchor="middle" class="label">[Automation: data-sink]</text>
  <text x="1070" y="334" text-anchor="middle" class="role">TRIGGER=SCHEDULE · OPERATOR-LEVEL</text>

  <rect x="1225" y="290" width="240" height="60" rx="6" class="auto"/>
  <text x="1345" y="316" text-anchor="middle" class="label">[Automation: daily-briefing]</text>
  <text x="1345" y="334" text-anchor="middle" class="role">TRIGGER=SCHEDULE · OPERATOR-LEVEL</text>

  <rect x="1500" y="290" width="240" height="60" rx="6" class="auto"/>
  <text x="1620" y="316" text-anchor="middle" class="label">[Automation: memory-cons]</text>
  <text x="1620" y="334" text-anchor="middle" class="role">TRIGGER=SCHEDULE · OPERATOR-LEVEL</text>

  <!-- Athena commander card v8 -->
  <rect x="950" y="380" width="380" height="320" rx="8" class="commander"/>
  <text x="1140" y="408" text-anchor="middle" class="label" font-weight="600">[Commander: Athena]</text>
  <text x="1140" y="426" text-anchor="middle" class="role">ROLE=ENGINEERING</text>
  <line x1="970" y1="442" x2="1310" y2="442" class="divider"/>
  <text x="970" y="464" class="meta">— [Automation: context-hygiene]   trigger=schedule</text>
  <text x="970" y="482" class="meta">— [Automation: validator-on-quest]  trigger=quest</text>
  <text x="970" y="500" class="meta">— [Automation: ad-hoc-investigate] trigger=manual</text>
  <line x1="970" y1="516" x2="1310" y2="516" class="divider"/>
  <text x="970" y="538" class="meta">Quests in flight:  2 active / 0 pending</text>
  <text x="970" y="556" class="meta">Cost (24h):        $4.21  ← from sum(conv.totalCostUsd)</text>
  <line x1="970" y1="572" x2="1310" y2="572" class="divider"/>
  <text x="970" y="594" class="new">CHANNELS — sourced from Conversation rows where surface ∈ channels</text>
  <rect x="970" y="604" width="120" height="22" rx="11" class="channel"/>
  <text x="1030" y="619" text-anchor="middle" class="meta">⌗ whatsapp · 2</text>
  <rect x="1100" y="604" width="120" height="22" rx="11" class="channel"/>
  <text x="1160" y="619" text-anchor="middle" class="meta">⌗ telegram · 1</text>
  <text x="970" y="650" class="new">UI CHATS (LIVE) — count only, not nodes; lives in /command-room</text>
  <text x="970" y="670" class="meta">3 active</text>
  <rect x="1245" y="592" width="55" height="18" rx="9" class="badge"/>
  <text x="1272" y="605" text-anchor="middle" class="badge-text">+ NEW</text>

  <!-- Hermes commander card v8 -->
  <rect x="1360" y="380" width="380" height="320" rx="8" class="commander"/>
  <text x="1550" y="408" text-anchor="middle" class="label" font-weight="600">[Commander: Hermes]</text>
  <text x="1550" y="426" text-anchor="middle" class="role">ROLE=VALIDATOR</text>
  <line x1="1380" y1="442" x2="1720" y2="442" class="divider"/>
  <text x="1380" y="464" class="meta">(no automations)</text>
  <line x1="1380" y1="516" x2="1720" y2="516" class="divider"/>
  <text x="1380" y="538" class="meta">Quests in flight:  1 active / 3 pending</text>
  <text x="1380" y="556" class="meta">Cost (24h):        $0.67</text>
  <line x1="1380" y1="572" x2="1720" y2="572" class="divider"/>
  <text x="1380" y="594" class="new">CHANNELS</text>
  <text x="1380" y="614" class="meta">(no channel bindings — UI-only commander)</text>
  <text x="1380" y="650" class="new">UI CHATS (LIVE)</text>
  <text x="1380" y="670" class="meta">1 active</text>

  <!-- Conversation legend -->
  <rect x="950" y="730" width="790" height="160" rx="8" class="panel" stroke="#5d7892"/>
  <text x="1345" y="756" text-anchor="middle" class="label" font-weight="600" fill="#5d7892">CONVERSATION ROWS — RUNTIME, NOT IDENTITY (constraint #21)</text>
  <text x="970" y="784" class="meta">Each Commander owns 0..N persistent Conversation rows in</text>
  <text x="970" y="802" class="meta">~/.hammurabi/commander/&lt;commanderId&gt;/conversations/*.json</text>
  <text x="970" y="828" class="meta">surface ∈ {whatsapp, telegram, discord} → CHANNEL-BOUND  → counted as chip on commander card</text>
  <text x="970" y="848" class="meta">surface ∈ {ui, cli, api}                 → EPHEMERAL CHAT → counted as "UI chats (live): N"</text>
  <text x="970" y="876" class="role" fill="#5d7892">CHART NEVER RENDERS PER-CONVERSATION NODES — AGGREGATES ONLY</text>

  <!-- Status callout -->
  <rect x="950" y="910" width="790" height="125" rx="8" class="panel" stroke="#2a6f3e" stroke-dasharray="3 3"/>
  <text x="1345" y="936" text-anchor="middle" class="label" font-weight="600" fill="#2a6f3e">SHIP ORDER FOR v8</text>
  <text x="970" y="962" class="meta" fill="#2a6f3e">1. Operator singleton + ~/.hammurabi/operators.json    (independent of #1216)</text>
  <text x="970" y="982" class="meta" fill="#2a6f3e">2. Automation entity + unified scheduler  (independent of #1216 — collapse 3 schedulers)</text>
  <text x="970" y="1002" class="meta" fill="#2a6f3e">3. OrgNode read model + GET /api/org  (NEW: aggregates conversations by surface)</text>
  <text x="970" y="1022" class="meta" fill="#2a6f3e">4. /org frontend route + commander-card layout with channel chips + UI-chat count</text>

  <!-- Bottom legend -->
  <text x="900" y="1080" text-anchor="middle" class="meta">Source: PR #1279 merged at ea70a211 ·  Conversation interface: apps/hammurabi/modules/commanders/conversation-store.ts:30-49  ·  Session naming: conversation-runtime.ts:17-21</text>
</svg>
