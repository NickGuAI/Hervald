<svg viewBox="0 0 880 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hervald approval routing — provider event to gate decision">
  <defs>
    <marker id="ar-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495E"/>
    </marker>
  </defs>

  <rect width="880" height="720" fill="#f7f2ea"/>
  <text x="440" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#1f2933">Approval Routing</text>
  <text x="440" y="66" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#52606d">Provider permission events become a single Hervald gate decision.</text>

  <!-- Layer 1: provider event -->
  <rect x="290" y="100" width="300" height="60" rx="14" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1f2933">Provider-native permission event</text>
  <text x="440" y="144" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">Claude tool call · Codex requestApproval · MCP elicitation · etc.</text>

  <!-- fork down to Claude / Codex -->
  <path d="M 440 160 L 440 190" stroke="#34495E" stroke-width="2" fill="none"/>
  <path d="M 220 200 L 660 200" stroke="#34495E" stroke-width="2" fill="none"/>
  <path d="M 220 200 L 220 230" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ar-arrow)"/>
  <path d="M 660 200 L 660 230" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ar-arrow)"/>

  <!-- Layer 2: Claude / Codex provider hooks -->
  <rect x="100" y="240" width="240" height="60" rx="12" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="220" y="264" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1f2933">Claude PreToolUse hook</text>
  <text x="220" y="284" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">structured allow/deny payload</text>

  <rect x="540" y="240" width="240" height="60" rx="12" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="660" y="264" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1f2933">Codex requestApproval</text>
  <text x="660" y="284" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">JSON-RPC granular method</text>

  <!-- join -->
  <path d="M 220 300 L 220 330" stroke="#34495E" stroke-width="2" fill="none"/>
  <path d="M 660 300 L 660 330" stroke="#34495E" stroke-width="2" fill="none"/>
  <path d="M 220 330 L 660 330" stroke="#34495E" stroke-width="2" fill="none"/>
  <path d="M 440 330 L 440 360" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ar-arrow)"/>

  <!-- Layer 3: adapter layer -->
  <rect x="280" y="370" width="320" height="60" rx="12" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="440" y="394" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1f2933">Hervald adapter layer</text>
  <text x="440" y="414" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">normalizes provider event into one gate request</text>

  <path d="M 440 430 L 440 460" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ar-arrow)"/>

  <!-- Layer 4: gate -->
  <rect x="280" y="470" width="320" height="60" rx="12" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="440" y="494" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1f2933">ActionPolicyGate</text>
  <text x="440" y="514" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">resolves auto · review · block for the requested action</text>

  <!-- fork to outcomes -->
  <path d="M 440 530 L 440 560" stroke="#34495E" stroke-width="2" fill="none"/>
  <path d="M 180 570 L 700 570" stroke="#34495E" stroke-width="2" fill="none"/>
  <path d="M 180 570 L 180 600" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ar-arrow)"/>
  <path d="M 440 570 L 440 600" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ar-arrow)"/>
  <path d="M 700 570 L 700 600" stroke="#34495E" stroke-width="2" fill="none" marker-end="url(#ar-arrow)"/>

  <!-- Layer 5: outcomes -->
  <rect x="80" y="610" width="200" height="80" rx="12" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="180" y="636" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1f2933">auto</text>
  <text x="180" y="656" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">allow immediately</text>
  <text x="180" y="673" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">no queue entry</text>

  <rect x="340" y="610" width="200" height="80" rx="12" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="440" y="636" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1f2933">review</text>
  <text x="440" y="656" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">enqueue + wait</text>
  <text x="440" y="673" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">human decision</text>

  <rect x="600" y="610" width="200" height="80" rx="12" fill="#efe7db" stroke="#9b8f7a" stroke-width="1.5"/>
  <text x="700" y="636" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1f2933">block</text>
  <text x="700" y="656" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">deny immediately</text>
  <text x="700" y="673" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52606d">no queue entry</text>
</svg>
