<svg viewBox="0 0 1800 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Automation wiring — current 3-scheduler split vs proposed unified Automation entity">
  <defs>
    <marker id="aw-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3a3a3a"/>
    </marker>
    <marker id="aw-arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a9756d"/>
    </marker>
    <marker id="aw-arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2a6f3e"/>
    </marker>
    <style>
      .panel     { fill: #fbfaf6; stroke: #d8d2c4; stroke-width: 1; }
      .scheduler { fill: #efe6e6; stroke: #a9756d; stroke-width: 1.6; }
      .store     { fill: #fff7d8; stroke: #b89a45; stroke-width: 1.4; }
      .route     { fill: #ddebf7; stroke: #4476a8; stroke-width: 1.4; }
      .unified   { fill: #e9efe6; stroke: #2a6f3e; stroke-width: 2; }
      .external  { fill: #fef5e7; stroke: #c08e3f; stroke-width: 1.4; stroke-dasharray: 4 3; }
      .label     { font-family: "JetBrains Mono", monospace; font-size: 12px; fill: #1d1d1d; }
      .label-bold{ font-family: "JetBrains Mono", monospace; font-size: 13px; font-weight: 600; fill: #1d1d1d; }
      .role      { font-family: "JetBrains Mono", monospace; font-size: 9px; fill: #54514a; letter-spacing: 0.06em; }
      .meta      { font-family: "JetBrains Mono", monospace; font-size: 10px; fill: #6f6a5d; }
      .title     { font-family: "JetBrains Mono", monospace; font-size: 17px; font-weight: 600; fill: #2a2a2a; letter-spacing: 0.06em; }
      .subtitle  { font-family: "JetBrains Mono", monospace; font-size: 11px; fill: #5e5a52; letter-spacing: 0.04em; text-transform: uppercase; }
      .arrow     { stroke: #3a3a3a; stroke-width: 1.4; fill: none; }
      .arrow-red { stroke: #a9756d; stroke-width: 1.4; fill: none; }
      .arrow-green { stroke: #2a6f3e; stroke-width: 1.6; fill: none; }
      .divider   { stroke: #c9c2b3; stroke-width: 1; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <text x="900" y="34" text-anchor="middle" class="title">AUTOMATION WIRING — CURRENT 3-SCHEDULER SPLIT  vs  PROPOSED UNIFIED ENTITY</text>
  <text x="900" y="56" text-anchor="middle" class="subtitle">spec v7 (#1198) calls for one Automation entity, three trigger modes. Today: three separate node-cron engines.</text>

  <!-- LEFT: CURRENT STATE -->
  <rect x="20" y="80" width="850" height="970" rx="10" class="panel"/>
  <text x="445" y="115" text-anchor="middle" class="title">CURRENT  ·  ea70a211</text>
  <text x="445" y="138" text-anchor="middle" class="subtitle">three node-cron engines, three persistence shapes</text>

  <!-- Scheduler 1 -->
  <rect x="60" y="180" width="780" height="220" rx="8" class="scheduler"/>
  <text x="450" y="208" text-anchor="middle" class="label-bold">[SentinelScheduler]   modules/sentinels/scheduler.ts:78</text>
  <text x="450" y="226" text-anchor="middle" class="role">node-cron engine #1</text>
  <line x1="80" y1="240" x2="820" y2="240" class="divider"/>
  <text x="80" y="262" class="label">Persistence:</text>
  <text x="220" y="262" class="meta">~/.hammurabi/sentinels/&lt;id&gt;/  (per-sentinel directory)</text>
  <text x="80" y="282" class="label">Schema:</text>
  <text x="220" y="282" class="meta">Sentinel { id, name, cron, instruction, agentType, status, runs[] }</text>
  <text x="80" y="302" class="label">Routes:</text>
  <text x="220" y="302" class="meta">/api/sentinels (list/CRUD)  ·  /api/sentinels/:id/run</text>
  <text x="80" y="322" class="label">Triggers:</text>
  <text x="220" y="322" class="meta">cron string only</text>
  <text x="80" y="342" class="label">Use case:</text>
  <text x="220" y="342" class="meta">long-running sweeps, journal flushers, daily-briefing-style work</text>
  <text x="80" y="372" class="role" fill="#a9756d">DELETE TARGET PER SPEC v7 — fully replaced by unified Automation</text>

  <!-- Scheduler 2 -->
  <rect x="60" y="420" width="780" height="220" rx="8" class="scheduler"/>
  <text x="450" y="448" text-anchor="middle" class="label-bold">[CommandRoomScheduler]   modules/command-room/scheduler.ts:56</text>
  <text x="450" y="466" text-anchor="middle" class="role">node-cron engine #2</text>
  <line x1="80" y1="480" x2="820" y2="480" class="divider"/>
  <text x="80" y="502" class="label">Persistence:</text>
  <text x="220" y="502" class="meta">~/.hammurabi/automation/tasks.json  (global bag)</text>
  <text x="220" y="518" class="meta">~/.hammurabi/commander/&lt;id&gt;/cron/tasks.json  (per-commander)</text>
  <text x="80" y="540" class="label">Schema:</text>
  <text x="220" y="540" class="meta">CommandRoomTask { id, type, cadence, instruction, ... }</text>
  <text x="80" y="560" class="label">Routes:</text>
  <text x="220" y="560" class="meta">/api/commanders/:id/crons (CRUD)  ·  /api/commanders/:id/cron-trigger</text>
  <text x="80" y="582" class="label">Triggers:</text>
  <text x="220" y="582" class="meta">cron preset cadences  ·  manual trigger</text>
  <text x="80" y="602" class="label">Use case:</text>
  <text x="220" y="602" class="meta">commander-owned recurring tasks (heartbeat-style nudges)</text>
  <text x="80" y="630" class="role" fill="#a9756d">DELETE TARGET PER SPEC v7 — fully replaced by unified Automation</text>

  <!-- Scheduler 3 -->
  <rect x="60" y="660" width="780" height="220" rx="8" class="scheduler"/>
  <text x="450" y="688" text-anchor="middle" class="label-bold">[registerCommanderCron]   modules/commanders/cron.ts:41</text>
  <text x="450" y="706" text-anchor="middle" class="role">node-cron engine #3</text>
  <line x1="80" y1="720" x2="820" y2="720" class="divider"/>
  <text x="80" y="742" class="label">Persistence:</text>
  <text x="220" y="742" class="meta">none (hard-coded constants in cron.ts:7-8)</text>
  <text x="80" y="762" class="label">Schema:</text>
  <text x="220" y="762" class="meta">two fixed crons baked in source:</text>
  <text x="240" y="780" class="meta">· COMMANDER_TRANSCRIPT_MAINTENANCE_CRON = "20 2 * * *"</text>
  <text x="240" y="796" class="meta">· COMMANDER_EMAIL_POLL_CRON           = "*/5 * * * *"</text>
  <text x="80" y="816" class="label">Routes:</text>
  <text x="220" y="816" class="meta">none (server-internal)</text>
  <text x="80" y="836" class="label">Use case:</text>
  <text x="220" y="836" class="meta">platform-internal housekeeping (transcript maintenance, email polling)</text>
  <text x="80" y="866" class="role" fill="#a9756d">CONSOLIDATION TARGET — keep functions but route through unified scheduler</text>

  <!-- Pain summary -->
  <rect x="60" y="900" width="780" height="135" rx="8" class="panel" stroke="#a9756d"/>
  <text x="450" y="924" text-anchor="middle" class="label-bold" fill="#a9756d">PAIN POINTS — three independent engines means:</text>
  <text x="80" y="950" class="meta">· three persistence shapes, three CRUD APIs, three UIs (sentinels page, command-room cron tab, none)</text>
  <text x="80" y="970" class="meta">· no shared trigger registry — quest-completion can't fan out across all automations atomically</text>
  <text x="80" y="990" class="meta">· no operator-level vs commander-scoped distinction in any one entity</text>
  <text x="80" y="1010" class="meta">· no `manual` trigger type — POST /api/automations/:id/run doesn't exist</text>
  <text x="80" y="1027" class="meta">· no `quest` trigger type at all — quest fan-out requires bespoke per-consumer wiring</text>

  <!-- RIGHT: PROPOSED UNIFIED -->
  <rect x="930" y="80" width="850" height="970" rx="10" class="panel"/>
  <text x="1355" y="115" text-anchor="middle" class="title">PROPOSED  ·  v8 (collapse to one entity)</text>
  <text x="1355" y="138" text-anchor="middle" class="subtitle">Automation { trigger: 'schedule' | 'quest' | 'manual' }  ·  one scheduler  ·  one route surface</text>

  <!-- Unified entity -->
  <rect x="970" y="180" width="780" height="320" rx="10" class="unified"/>
  <text x="1360" y="210" text-anchor="middle" class="label-bold" fill="#2a6f3e">[Automation]   modules/automations/   ← NEW MODULE</text>
  <text x="1360" y="228" text-anchor="middle" class="role">single entity, three trigger discriminators</text>
  <line x1="990" y1="244" x2="1730" y2="244" class="divider"/>
  <text x="990" y="266" class="label">Persistence:</text>
  <text x="1130" y="266" class="meta">~/.hammurabi/automations/&lt;id&gt;.json  (single shape)</text>
  <text x="990" y="288" class="label">Schema:</text>
  <text x="1130" y="288" class="meta">Automation {</text>
  <text x="1150" y="306" class="meta">  id, operatorId, parentCommanderId?,</text>
  <text x="1150" y="324" class="meta">  name, instruction, agentType, permissionMode,</text>
  <text x="1150" y="342" class="meta">  trigger: 'schedule' | 'quest' | 'manual',</text>
  <text x="1150" y="360" class="meta">  schedule?     ← required when trigger='schedule'</text>
  <text x="1150" y="378" class="meta">  questTrigger? ← required when trigger='quest'</text>
  <text x="1150" y="396" class="meta">                  { event: 'completed', commanderId? }</text>
  <text x="1150" y="414" class="meta">  skills: string[],   templateId?,   status,   runs[]</text>
  <text x="1130" y="432" class="meta">}</text>
  <text x="990" y="458" class="label">Routes:</text>
  <text x="1130" y="458" class="meta">GET/POST /api/automations  ·  PATCH/DELETE /api/automations/:id</text>
  <text x="1130" y="476" class="meta">POST /api/automations/:id/run  (any trigger type, manual fire)</text>

  <!-- Unified scheduler -->
  <rect x="970" y="520" width="780" height="180" rx="10" class="unified"/>
  <text x="1360" y="548" text-anchor="middle" class="label-bold" fill="#2a6f3e">[AutomationScheduler]   modules/automations/scheduler.ts</text>
  <text x="1360" y="566" text-anchor="middle" class="role">one node-cron engine + quest-event subscriber</text>
  <line x1="990" y1="582" x2="1730" y2="582" class="divider"/>
  <text x="990" y="604" class="meta">on boot — load all Automation rows; for each:</text>
  <text x="1010" y="624" class="meta">trigger='schedule' → cron.schedule(automation.schedule, runAutomation)</text>
  <text x="1010" y="642" class="meta">trigger='quest'    → questEventBus.subscribe(automation.questTrigger, runAutomation)</text>
  <text x="1010" y="660" class="meta">trigger='manual'   → no boot-time wiring; only POST /api/automations/:id/run fires</text>
  <text x="990" y="688" class="role" fill="#2a6f3e">runAutomation() spawns a stream session, dispatches as a worker creator=automation</text>

  <!-- Migration block -->
  <rect x="970" y="720" width="780" height="160" rx="8" class="panel" stroke="#2a6f3e" stroke-dasharray="3 3"/>
  <text x="1360" y="746" text-anchor="middle" class="label-bold" fill="#2a6f3e">MIGRATION (one release, no shim window — Constraint #8)</text>
  <text x="990" y="772" class="meta">1. Read every Sentinel from sentinels/ → write Automation { trigger:'schedule', schedule:cron, ... }</text>
  <text x="990" y="792" class="meta">2. Read every CommandRoomTask → write Automation { trigger:'schedule', parentCommanderId? }</text>
  <text x="990" y="812" class="meta">3. registerCommanderCron internals stay in code, but register through unified scheduler interface</text>
  <text x="990" y="832" class="meta">4. Delete /api/sentinels and /api/commanders/:id/crons in same release</text>
  <text x="990" y="852" class="meta">5. Delete modules/sentinels/, /api/commanders/:id/crons routes, /api/commanders/:id/cron-trigger</text>
  <text x="990" y="870" class="meta">6. ~/.hammurabi/sentinels/* and ~/.hammurabi/automation/tasks.json migrated then removed</text>

  <!-- Wins -->
  <rect x="970" y="900" width="780" height="135" rx="8" class="panel" stroke="#2a6f3e"/>
  <text x="1360" y="924" text-anchor="middle" class="label-bold" fill="#2a6f3e">WINS — one entity, three trigger discriminators</text>
  <text x="990" y="950" class="meta">✓ one persistence shape, one CRUD API, one UI surface</text>
  <text x="990" y="970" class="meta">✓ quest fan-out is built-in (questEventBus subscribers)</text>
  <text x="990" y="990" class="meta">✓ operator-level vs commander-scoped is just `parentCommanderId` null vs set</text>
  <text x="990" y="1010" class="meta">✓ POST /api/automations/:id/run works for any trigger type (manual fire of a scheduled job)</text>
  <text x="990" y="1027" class="meta">✓ template flow works uniformly — one Automation template library, not three</text>

  <!-- Footer -->
  <text x="900" y="1075" text-anchor="middle" class="meta">collapse independent of #1216  ·  shipping order: Operator → Automation → OrgNode read model → /org UI</text>
</svg>
